services:
  - type: web
    name: shopflow-voice-agent
    runtime: docker
    dockerfilePath: ./Dockerfile
    rootDir: Voice Ai Agentic System
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: groq
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: DEBUG
        value: "true"
